<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
        <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css">
        <link rel="stylesheet" href="assets/css/main.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
        <script src="https://code.iconify.design/iconify-icon/3.0.0/iconify-icon.min.js"></script>
        <title>Taquilla reversible</title>
    </head>
    
    <body>
        <div class="d-flex align-items-center justify-content-center flex-column" style="position: fixed; left: 0; right: 0; top: 0; bottom: 0; width: 100%; height: 100%; z-index: 9999; background-color: rgba(255, 255, 255, .7);">
            <img src="assets/images/ado-rounded.png" class="img-fluid" alt="">
            <strong>Buscando boletos de regreso...</strong>
        </div>
        
        
        <section class="container-fluid py-3 sticky-top" id="estatus_corrida" style="filter: blur(5px);">
            <div class="container-lg">
                <div class="row">
                    <div class="col-12 col-lg-12 d-flex align-items-center justify-content-between">
                        <button class="btn btn-white py-1 titles24 shadow-none d-flex align-items-center justify-content-center mr-3">
                            <iconify-icon icon="ant-design:left-outlined"></iconify-icon> Regresar
                        </button>
                        
                        <img src="assets/images/corrida-on.png" class="img-fluid mr-2" alt="">
                        <span class="txt14">Elegir corrida</span>
                        
                        <img src="assets/images/separador.png" class="separador img-fluid mx-2 mx-sm-2 mx-md-2 my-2 my-sm-2 my-md-0 my-lg-0" alt="">
                        
                        <img src="assets/images/asientos-off.png" class="img-fluid mr-2" alt="">
                        <span class="txt14 text-muted2">Asientos y datos</span>
                        
                        <img src="assets/images/separador.png" class="separador img-fluid mx-2 mx-sm-2 mx-md-2 mx-2 my-2 my-sm-2 my-md-0 my-lg-0" alt="">
                        
                        <img src="assets/images/pago-off.png" class="img-fluid mr-2" alt="">
                        <span class="txt14 text-muted2">Pago</span>
                    </div>
                </div>
            </div>
        </section>
        
        <!-- Trayecto -->
        <section class="container-fluid containerlg-trayecto py-4" style="filter: blur(5px);">
            <div class="container-lg rounded-lg">
                <div class="row p-2">
                    <div class="col-2 col-lg-1">
                        <img src="assets/images/ruta.svg" class="img-fluid" alt="" style="width: 50px;">
                    </div>
                    <div class="col-10 col-lg-11 pl-0">
                        <div class="row">
                            <div class="col-lg-12" data-aos="fade-left" data-aos-duration="1500">
                                <h5 class="titles24">Central México Norte, CDMX</h5>
                                <span class="text18">Terminal origen</span>
                                <!-- <span class="float-right titles24">12:00hrs</span> -->
                                <hr>
                            </div>
                            <div class="col-lg-12" data-aos="fade-right" data-aos-duration="1900">
                                <h5 class="titles24">Costa Esmeralda, Ver.</h5>
                                <span class="text18">Terminal destino</span>
                                <!-- <span class="float-right titles24">14:30hrs</span> -->
                                <hr>
                            </div>                           
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Boletos/Fecha -->
        <section class="container-fluid py-4 whiteback" style="filter: blur(5px);">
            <div class="container-lg">
                <div class="row">
                    <div class="col-lg-12 d-flex align-items-center justify-content-start" data-aos="zoom-in" data-aos-duration="1900">
                        <button class="btn btn-purple py-1 titles24 shadow-none mr-3 text-uppercase">
                            Elije tu(s) boleto(s) de ida
                        </button>
                        <p class="fblack titles24 m-0 p-0">Hoy - Vier. 30 de ago. 21:31 h</p>                         
                    </div>
                    
                    <div class="col-lg-12 text-left mt-3" data-aos="zoom-in" data-aos-duration="1900">
                        <span class="fblack txt18">3 adultos, 2 niños, 1 INAPAM</span>                                                                       
                    </div>
                </div>
            </div>
        </section>


        <!-- Corridas disponibles -->
        <section class="container-fluid grayf1back" style="filter: blur(5px);">
            <div class="container-lg py-4" id="corridas" data-aos="fade-up" data-aos-duration="1500">
                <!-- 
                    Aquí se pintan las corridas N veces (mediante la función javascript de abajo) para evitar repetir el bloque HTML,
                    si se quiere quitar la función y pintar el HTML de forma normal, basta con traer aquí el código dentro de la variable bloqueHTML
                -->
            </div>
        </section>
        
            
        <script src="https://code.jquery.com/jquery-3.7.1.slim.min.js"></script> 
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
        <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
        <script>
            AOS.init();
            
            const corridas = document.getElementById('corridas');

            const bloqueHTML = `
                <div class="row shadow whiteback mt-4 pt-3 rounded-top">
                    <div class="col-12 col-sm-2 col-lg-2 d-flex align-items-center justify-content-center">
                        <img src="assets/images/ADO.png" alt="" class="img-fluid">
                    </div>
                    <div class="col-12 col-sm-7 col-lg-6 d-flex align-items-start justify-content-between borders">
                        <div>
                            <span class="titles24">06:00 h</span>
                            <p class="txt14 pb-0 mb-0">México, TAPO</p>
                        </div>
                        <div>
                            <span class="text14 fdark1">3h 10min. aprox. </span>
                        </div>
                        <div>
                            <span class="titles24">06:00 h</span>
                            <p class="txt14 pb-0 mb-0">México, TAPO</p>
                        </div>
                    </div>
                    <div class="col-6 col-sm-3 col-lg-2 offset-lg-0 px-2 px-sm-2 px-md-2 pt-3 pt-sm-3 pt-md-3 pt-lg-0">
                        <p class="txt14 fred text-right mb-0 pb-0">
                            <img src="assets/images/promo.png" class="img-fluid mt-n1" >
                            $1,200.00 MXN
                        </p>
                        <p class="txt18 f700 fdark1 text-right mb-0 pb-0">$1,000.00MXN</p>
                    </div>
                    <div class="col-6 col-sm-3 offset-sm-9 col-lg-2 offset-lg-0 d-flex align-items-center justify-content-center pt-3 pt-sm-3 pt-md-3 pt-lg-0">
                        <a href="pantalla3.html" class="btn btn-purple w-100 shadow-none">Seleccionar</a>
                    </div>                
                </div><!-- /row corridas -->
                <div class="row shadow" style="border-top: 1px solid #B5BAC7; background-color: #ECEFF6;">
                    <div class="col-8">
                        <ul class="list-group list-group-horizontal justify-content-end">
                            <li class="list-group-item">
                                <span class="txt12">Viaje Local</span>
                                <img src="assets/images/info.png" class="img-fluid" alt="" style="width: 15px;">
                            </li>
                            <li class="list-group-item">
                                <span class="txt12">Servicio Lujo</span>
                            </li>
                            <li class="list-group-item">
                                <span class="txt12">Quedan 29 asientos</span>                                
                            </li>
                        </ul>
                    </div>
                    <div class="col-4 d-flex align-items-center justify-content-end">
                        <a href="#" class="btn purple-link d-flex align-items-center"><span class="mr-2">Más Información</span><iconify-icon icon="formkit:right" width="7" height="16"  style="color: #5F2167"></iconify-icon></a>
                    </div>
                </div>
            `;

            
            for (let i = 0; i < 10; i++) {
                corridas.innerHTML += bloqueHTML; 
            }
        </script>
    </body>
</html>
