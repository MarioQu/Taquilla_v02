<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="assets/css/bootstrap.min.css">
        <link rel="stylesheet" href="assets/css/main.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
        <script src="https://code.iconify.design/iconify-icon/3.0.0/iconify-icon.min.js"></script>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/litepicker/dist/css/litepicker.css"/>
        <script src="https://cdn.jsdelivr.net/npm/litepicker/dist/litepicker.js"></script>
        <title>Document</title>
    </head>
    
    <body>
        <audio src="assets/audios/ingresa-lector.mp3" autoplay id="ingresa-lector"></audio>
        
        <div class="container-fluid d-flex align-items-center justify-content-between flex-column" style="height: 100vh;">
            <div class="container">
                <div class="row py-5">
                    <div class="col-12">
                        <h1 class="text-center f-40 fw-700">Pago con tarjeta</h1>
                        <hr class="mt-4">
                    </div>
                </div>
            </div>
            
            <div class="container">
                <div class="row" style="height: 100%;">
                    <div class="col-12">
                        <img src="assets/images/lector.png" class="img-fluid d-block mx-auto" alt="" data-aos="fade-up" data-aos-duration="1600">                    
                    </div>
                    <div class="col-12 green-div2 p-3 shadow rad20 mt-4">
                        <p class="m-0 p-0 f-28 fw-700 text-center">Ingresa, desliza o aproxima la tarjeta al lector</p>
                    </div>
                </div>
            </div>
            
            <div class="container-fluid py-5" style="background-color: #F1F3F9;">
                <div class="row">
                    <div class="col-12 col-sm-6 col-md-6 col-lg-6 mb-3 mb-sm-0 mb-md-0 mb-lg-0">
                        <a href="index8.html" class="btn white-btn w-100 py-3 f-24 rad20 shadow-none">Cancelar</a>
                    </div>
                    <div class="col-12 col-sm-6 col-md-6 col-lg-6">
                        <a href="index10.html" class="btn purple-btn w-100 py-3 f-24 rad20 shadow-none">Reintentar</a>
                    </div>
                </div>
            </div>
        </div>
 
        
        <script src="assets/js/jquery-4.0.0.min.js"></script>
        <script src="assets/js/bootstrap.min.js"></script>
        <script>
            // Autoplay del audio al abrir el sitio
            document.body.addEventListener('click', function() {
                const audio = document.getElementById('ingresa-lector');
                audio.play();
                }, 
            { 
                once: true 
            });
        </script>
    </body>
</html>
